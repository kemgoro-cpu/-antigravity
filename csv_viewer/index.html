<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSV Chart Viewer</title>
    <link href="lib/fonts/google-fonts.css" rel="stylesheet">
    <link href="lib/boxicons/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2><i class='bx bx-line-chart' aria-hidden="true"></i> CSV Viewer</h2>
            </div>
            <div class="sidebar-content">

                <!-- File Upload -->
                <div class="control-group">
                    <h3><i class='bx bx-upload' aria-hidden="true"></i> Files</h3>
                    <div id="drop-zone" class="drop-zone">
                        <i class='bx bx-cloud-upload' aria-hidden="true"></i>
                        <p>Drag & Drop files here</p>
                        <p class="small">CSV / TRN</p>
                        <button class="btn-primary" onclick="document.getElementById('file-input').click()">Browse Files</button>
                        <input type="file" id="file-input" multiple accept=".csv,.trn" class="hidden">
                    </div>
                    <ul id="file-list" class="file-list"></ul>
                </div>

                <!-- Parse Settings -->
                <div class="control-group">
                    <h3><i class='bx bx-cog' aria-hidden="true"></i> Settings</h3>
                    <div class="settings-grid">
                        <label>Name Row:</label>
                        <input type="number" id="name-row-idx" value="1" min="1">
                        <label>Unit Row:</label>
                        <input type="number" id="unit-row-idx" value="2" min="1">
                    </div>
                </div>

                <!-- Custom RAM -->
                <div class="control-group">
                    <h3><i class='bx bx-calculator' aria-hidden="true"></i> Custom RAM
                        <i class='bx bx-help-circle' id="custom-ram-help" title="使える関数の一覧を表示" role="button" tabindex="0" aria-label="使える関数の一覧を表示" style="cursor:pointer;margin-left:auto;font-size:1rem;opacity:0.5;"></i>
                    </h3>
                    <div class="custom-ram-form">
                        <input type="text" id="custom-ram-name" placeholder="Name" class="custom-ram-input">
                        <div style="position:relative;flex:1;">
                            <input type="text" id="custom-ram-expr" placeholder="e.g. sqrt(pow(X,2) + pow(Y,2))" class="custom-ram-input" autocomplete="off">
                            <ul id="custom-ram-suggest" class="custom-ram-suggest"></ul>
                        </div>
                        <button id="custom-ram-add" class="btn-primary btn-sm">Add</button>
                    </div>
                    <div id="custom-ram-validation" class="custom-ram-validation"></div>
                    <ul id="custom-ram-list" class="custom-ram-list"></ul>
                </div>

                <!-- Channel Selection (main file only) -->
                <div class="control-group active-columns-group">
                    <h3><i class='bx bx-list-ul' aria-hidden="true"></i> Channels <span id="channel-source-label" class="channel-source-label"></span></h3>
                    <div class="search-box">
                        <i class='bx bx-search' aria-hidden="true"></i>
                        <input type="text" id="column-search" placeholder="Search channels..." aria-label="チャンネル検索">
                    </div>
                    <div id="column-list" class="column-list">
                        <div class="placeholder-text">Upload a CSV to see channels</div>
                    </div>
                </div>

            </div>
        </aside>

        <!-- サイドバー幅のリサイズ用ドラッグハンドル -->
        <div id="sidebar-resize-handle" class="sidebar-resize-handle"></div>

        <!-- Main Chart Area -->
        <main class="main-content">
            <div class="toolbar">
                <div class="toolbar-left">
                    <button id="clear-all-btn" class="btn-secondary" disabled>
                        <i class='bx bx-trash' aria-hidden="true"></i> Clear All
                    </button>
                    <div class="toolbar-sep"></div>
                    <button id="zoom-mode-btn" class="btn-secondary" title="Click then drag on chart to box-zoom (B)">
                        <i class='bx bx-selection' aria-hidden="true"></i> Box Zoom
                    </button>
                    <button id="reset-zoom-btn" class="btn-secondary" disabled title="Reset to full view (R)">
                        <i class='bx bx-reset' aria-hidden="true"></i> Reset View
                    </button>
                    <div class="toolbar-sep"></div>
                    <button id="shift-mode-btn" class="btn-secondary" disabled title="Drag chart to shift sub file timeline (T)">
                        <i class='bx bx-transfer-alt' aria-hidden="true"></i> Time Shift
                    </button>
                    <div class="toolbar-sep"></div>
                    <label class="sampling-label" title="Data sampling mode">
                        <i class='bx bx-pulse' aria-hidden="true"></i>
                        <select id="sampling-mode" aria-label="Data sampling mode">
                            <option value="lttb" selected>LTTB (fast)</option>
                            <option value="">None (exact)</option>
                        </select>
                    </label>
                    <div class="toolbar-sep"></div>
                    <button id="mono-color-btn" class="btn-secondary" title="単色モード: ファイルごとに同じ色で表示">
                        <i class='bx bx-palette' aria-hidden="true"></i> Mono Color
                    </button>
                    <div class="toolbar-sep"></div>
                    <button id="export-png-btn" class="btn-secondary" disabled title="Save chart as PNG file (Ctrl+S)">
                        <i class='bx bx-download' aria-hidden="true"></i> Save PNG
                    </button>
                    <button id="copy-chart-btn" class="btn-secondary" disabled title="Copy chart to clipboard (Ctrl+Shift+C)">
                        <i class='bx bx-copy' aria-hidden="true"></i> Copy
                    </button>
                    <div class="toolbar-sep"></div>
                    <button id="export-settings-btn" class="btn-secondary" title="設定をJSONファイルにエクスポート">
                        <i class='bx bx-export' aria-hidden="true"></i> Settings
                    </button>
                    <button id="import-settings-btn" class="btn-secondary" title="JSONファイルから設定をインポート">
                        <i class='bx bx-import' aria-hidden="true"></i> Load
                    </button>
                </div>
                <div class="toolbar-right">
                    <span id="toolbar-hint" class="toolbar-hint"></span>
                    <button id="shortcuts-help-btn" class="btn-secondary" aria-label="キーボードショートカット一覧" title="キーボードショートカット (?)">
                        <i class='bx bx-keyboard' aria-hidden="true"></i>
                    </button>
                </div>
            </div>

            <div class="chart-container">
                <div id="chart" class="echarts-dom"></div>
                <div id="chart-overlay" class="chart-overlay">
                    <i class='bx bx-line-chart icon-large' aria-hidden="true"></i>
                    <p>Select channels from the sidebar to visualize</p>
                </div>
            </div>
        </main>

    </div>

    <script src="lib/papaparse.min.js"></script>
    <script src="lib/echarts.min.js"></script>
    <script src="app.js" charset="UTF-8"></script>
</body>
</html>
