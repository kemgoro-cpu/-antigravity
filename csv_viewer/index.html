<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSV Chart Viewer</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
    <!-- Boxicons for UI icons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar for Controls -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2><i class='bx bx-line-chart'></i> CSV Viewer</h2>
            </div>
            
            <div class="sidebar-content">
                <!-- File Upload Section -->
                <div class="control-group">
                    <h3><i class='bx bx-upload'></i> Files</h3>
                    <div id="drop-zone" class="drop-zone">
                        <i class='bx bx-cloud-upload'></i>
                        <p>Drag & Drop CSVs here</p>
                        <p class="small">or</p>
                        <button class="btn-primary" onclick="document.getElementById('file-input').click()">Browse Files</button>
                        <input type="file" id="file-input" multiple accept=".csv" class="hidden">
                    </div>
                    <ul id="file-list" class="file-list">
                        <!-- Loaded files will appear here -->
                    </ul>
                </div>

                <!-- Parse Settings Section -->
                <div class="control-group">
                    <h3><i class='bx bx-cog'></i> Settings</h3>
                    <div class="settings-grid">
                        <label>Name Row Index:</label>
                        <input type="number" id="name-row-idx" value="1" min="1">
                        <label>Unit Row Index:</label>
                        <input type="number" id="unit-row-idx" value="2" min="1">
                    </div>
                </div>

                <!-- Column Selection Section -->
                <div class="control-group active-columns-group">
                    <h3><i class='bx bx-list-ul'></i> Available Columns</h3>
                    <div class="search-box">
                        <i class='bx bx-search'></i>
                        <input type="text" id="column-search" placeholder="Search columns...">
                    </div>
                    <div id="column-list" class="column-list">
                        <div class="placeholder-text">Upload a file to see columns</div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Chart Area -->
        <main class="main-content">
            <div class="toolbar">
                <div class="toolbar-left">
                    <button id="clear-all-btn" class="btn-secondary" disabled>
                        <i class='bx bx-trash'></i> Clear All
                    </button>
                </div>
                <!-- Future expandability toolbar -->
            </div>
            <div class="chart-container">
                <div id="chart" class="echarts-dom"></div>
                <div id="chart-overlay" class="chart-overlay">
                    <i class='bx bx-chart icon-large'></i>
                    <p>Select columns from the sidebar to visualize</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <!-- PapaParse for fast CSV parsing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <!-- Apache ECharts -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <!-- App Logic -->
    <script src="app.js"></script>
</body>
</html>
